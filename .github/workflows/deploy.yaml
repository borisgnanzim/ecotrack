name: Deploy Ecotrack

permissions:
  contents: write

on:
  # Déployer uniquement si DevSecOps est validé
  workflow_run:
    workflows:
      - DevSecOps
    types:
      - completed

jobs:

  # ─────────────────────────────────────────────────────────────────
  # 1. VALIDATION BACKEND
  #    Vérifie que chaque microservice démarre correctement
  #    dans un environnement calqué sur le docker-compose.
  #    Rien n'est envoyé sur un VPS — c'est un smoke test.
  # ─────────────────────────────────────────────────────────────────
  validate-backend:

    name: Backend — ${{ matrix.service }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: ci
      DATABASE_URL: postgresql://ecotrack:ecotrack_password@localhost:5432/ecotrack_db
      REDIS_URL: redis://localhost:6379
      KAFKA_BROKERS: localhost:9092

    strategy:
      fail-fast: false
      matrix:
        service:
          - service-users
          - service-gamification
          - service-analytics
          - service-iot
          - service-routes
          - service-containers
          - service-api-gateway

    # ── Infrastructure (calquée sur docker-compose.yml) ──────────────
    services:

      # PostgreSQL — même image que docker-compose (commenté dans le compose)
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ecotrack
          POSTGRES_PASSWORD: ecotrack_password
          POSTGRES_DB: ecotrack_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      # Redis — identique au docker-compose
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      # Zookeeper — requis par Kafka (docker-compose : confluentinc/cp-zookeeper:7.5.0)
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181
        options: >-
          --health-cmd "nc -z localhost 2181"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      # Kafka — même image et config que docker-compose
      # PLAINTEXT_HOST expose Kafka sur localhost:9092 pour le runner
      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_LOG_RETENTION_HOURS: 168
        ports:
          - 9092:9092
        options: >-
          --health-cmd "/usr/bin/kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 15

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./backend/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ./backend/${{ matrix.service }}
        run: npm ci

      # Génère le client Prisma pour tous les services sauf l'API Gateway
      - name: Generate Prisma client
        if: ${{ matrix.service != 'service-api-gateway' }}
        working-directory: ./backend/${{ matrix.service }}
        run: npx prisma generate

      # Applique les migrations — les services pas encore stables ont continue-on-error
      - name: Run database migrations
        if: ${{ matrix.service != 'service-api-gateway' }}
        working-directory: ./backend/${{ matrix.service }}
        run: npx prisma migrate deploy
        continue-on-error: ${{ contains(
          fromJSON('["service-containers","service-analytics","service-routes","service-iot"]'),
          matrix.service) }}

      # Démarre le service 8 secondes pour vérifier qu'il boot sans crash
      - name: Smoke test — service starts
        working-directory: ./backend/${{ matrix.service }}
        run: |
          ENTRY=$(node -e "const p=require('./package.json'); console.log(p.main || 'server.js')")
          echo "Démarrage de ${{ matrix.service }} ($ENTRY)..."
          node "$ENTRY" &
          SERVICE_PID=$!
          sleep 8
          if kill -0 $SERVICE_PID 2>/dev/null; then
            echo "✓ ${{ matrix.service }} démarre correctement"
            kill $SERVICE_PID
          else
            echo "✗ ${{ matrix.service }} n'a pas démarré"
            exit 1
          fi
        continue-on-error: ${{ contains(
          fromJSON('["service-containers","service-analytics","service-routes","service-api-gateway","service-iot"]'),
          matrix.service) }}

      - name: Ready for VPS deployment
        run: echo "✓ ${{ matrix.service }} validé — prêt pour le déploiement"

  # ─────────────────────────────────────────────────────────────────
  # 2. DÉPLOIEMENT FRONTEND
  #    S'exécute uniquement après que tous les backends sont validés.
  # ─────────────────────────────────────────────────────────────────
  deploy-frontend:

    name: Frontend — ${{ matrix.frontend }}
    needs: validate-backend
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      matrix:
        frontend:
          - ecotrack-admin-vjs
          - ecotrack-citoyen-vjs

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        working-directory: ./front/${{ matrix.frontend }}
        run: npm ci

      - name: Build VueJS app
        working-directory: ./front/${{ matrix.frontend }}
        run: npm run build

      - name: Verify build
        working-directory: ./front/${{ matrix.frontend }}
        run: ls -la dist

      # Remplacer par la vraie cible de déploiement (VPS, Vercel, etc.)
      - name: Deploy application
        run: echo "Ready for deployment"

  # ─────────────────────────────────────────────────────────────────
  # 3. SYNCHRONISATION MAIN
  #    Si toutes les étapes sont passées, on avance main en fast-forward
  #    vers le commit validé par le pipeline.
  # ─────────────────────────────────────────────────────────────────
  push-main:

    name: Push main
    needs: deploy-frontend
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

      - name: Checkout validated commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward main to validated commit
        run: |
          git fetch origin main
          git checkout main
          git merge --ff-only "${{ github.event.workflow_run.head_sha }}"
          git push origin HEAD:main
