name: DevSecOps

on:

  # Exécuter les analyses de sécurité
  # uniquement si les tests sont validés
  workflow_run:
    workflows:
      - Run Tests
    types:
      - completed

jobs:

  security:

    # Continuer uniquement si les tests ont réussi
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      # Scanner chaque microservice séparément
      matrix:
        service:
          - service-users
          - service-gamification
          - service-containers
          - service-analytics
          - service-routes
          - service-api-gateway
          - service-iot

    steps:

      # Récupération du commit exact testé
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Installation de Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Installation des dépendances du microservice
      - name: Install dependencies
        working-directory: ./backend/${{ matrix.service }}
        run: npm ci

      # Installation de Snyk
      - name: Install Snyk
        run: npm install -g snyk

      # Analyse des dépendances
      - name: SCA Scan
        working-directory: ./backend/${{ matrix.service }}
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    # Job séparé pour le frontend
  frontend-security:

    # Exécuter ce job uniquement si les tests sont passés
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      # Scanner les deux applications frontend
      matrix:
        frontend:
          - ecotrack-admin-vjs
          - ecotrack-citoyen-vjs

    steps:

      # Récupération du commit validé par les tests
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Installation de Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Installation des dépendances
      - name: Install Frontend
        working-directory: ./front/${{ matrix.frontend }}
        run: npm ci

      # Installation de Snyk
      - name: Install Snyk
        run: npm install -g snyk

      # Analyse des dépendances frontend
      - name: Frontend SCA Scan
        working-directory: ./front/${{ matrix.frontend }}
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Analyse statique du code
      # Avec modif de snyk_key
      - name: Frontend SAST Scan
        working-directory: ./front/${{ matrix.frontend }}
        run: snyk code test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # Vérification que l'application compile
      - name: Build Frontend
        working-directory: ./front/${{ matrix.frontend }}
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # Scan des images Docker de nos microservices
  # Construit chaque image à partir de son Dockerfile et analyse avec Snyk
  # continue-on-error : les vulnérabilités héritées de l'image de base (node:22-alpine)
  # ne bloquent pas le pipeline — elles sont rapportées pour correction progressive
  # ──────────────────────────────────────────────────────────────────────────
  container-security:

    name: Container — ${{ matrix.service }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - service-users
          - service-gamification
          - service-containers
          - service-analytics
          - service-routes
          - service-api-gateway
          - service-iot

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Snyk
        run: npm install -g snyk

      # Construction de l'image à partir du Dockerfile du microservice
      - name: Build Docker image
        run: |
          docker build \
            -t ecotrack/${{ matrix.service }}:${{ github.sha }} \
            ./backend/${{ matrix.service }}

      # Scan Snyk de l'image construite
      # --file pointe vers le Dockerfile pour des recommandations de remédiation
      - name: Snyk container scan
        run: |
          snyk container test \
            ecotrack/${{ matrix.service }}:${{ github.sha }} \
            --file=./backend/${{ matrix.service }}/Dockerfile \
            --severity-threshold=high \
            --json-file-output=snyk-container-${{ matrix.service }}.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # Sauvegarde du rapport JSON pour analyse ultérieure
      - name: Upload container scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-container-${{ matrix.service }}
          path: snyk-container-${{ matrix.service }}.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Scan des images d'infrastructure tierces (docker-compose.yml)
  # redis, kafka, zookeeper — images que nous n'avons pas buildées nous-mêmes
  # ──────────────────────────────────────────────────────────────────────────
  infra-container-security:

    name: Container — ${{ matrix.image.label }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - { ref: "node:22-alpine",                  label: "node-22-alpine" }
          - { ref: "redis:7-alpine",                  label: "redis-7-alpine" }
          - { ref: "confluentinc/cp-kafka:7.5.0",     label: "kafka-7-5" }
          - { ref: "confluentinc/cp-zookeeper:7.5.0", label: "zookeeper-7-5" }

    steps:

      - name: Install Snyk
        run: npm install -g snyk

      # Scan direct de l'image tierce — aucun build requis
      - name: Snyk container scan — ${{ matrix.image.ref }}
        run: |
          snyk container test ${{ matrix.image.ref }} \
            --severity-threshold=high \
            --json-file-output=snyk-infra-${{ matrix.image.label }}.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload infrastructure scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-infra-${{ matrix.image.label }}
          path: snyk-infra-${{ matrix.image.label }}.json
          retention-days: 30