name: Run Tests

on:
  push:
    branches:
      - main
      - develop
      - dev
  pull_request:
    branches:
      - main
      - develop
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Service Users Tests
      - name: Install dependencies - service-users
        working-directory: ./backend/service-users
        run: npm ci

      - name: Run tests - service-users
        working-directory: ./backend/service-users
        run: npm test -- --coverage
        continue-on-error: false

      # Service Gamification Tests
      - name: Install dependencies - service-gamification
        working-directory: ./backend/service-gamification
        run: npm ci

      - name: Run tests - service-gamification
        working-directory: ./backend/service-gamification
        run: npm test
        continue-on-error: false

      # Service Containers Tests (add when configured)
      - name: Install dependencies - service-containers
        working-directory: ./backend/service-containers
        run: npm ci
        continue-on-error: true

      - name: Run tests - service-containers
        working-directory: ./backend/service-containers
        run: npm test
        continue-on-error: true

      # Service Analytics Tests (add when configured)
      - name: Install dependencies - service-analytics
        working-directory: ./backend/service-analytics
        run: npm ci
        continue-on-error: true

      - name: Run tests - service-analytics
        working-directory: ./backend/service-analytics
        run: npm test
        continue-on-error: true

      # Service Routes Tests (add when configured)
      - name: Install dependencies - service-routes
        working-directory: ./backend/service-routes
        run: npm ci
        continue-on-error: true

      - name: Run tests - service-routes
        working-directory: ./backend/service-routes
        run: npm test
        continue-on-error: true

      # Service API Gateway Tests (add when configured)
      - name: Install dependencies - service-api-gateway
        working-directory: ./backend/service-api-gateway
        run: npm ci
        continue-on-error: true

      - name: Run tests - service-api-gateway
        working-directory: ./backend/service-api-gateway
        run: npm test
        continue-on-error: true

  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies - service-users
        working-directory: ./backend/service-users
        run: npm ci

      - name: Generate coverage report
        working-directory: ./backend/service-users
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/service-users/coverage/coverage-final.json
          flags: service-users
          fail_ci_if_error: false
