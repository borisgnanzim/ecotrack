name: Run Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]
        service: [service-users, service-gamification, service-containers, service-analytics, service-routes, service-api-gateway]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ecotrack
          POSTGRES_PASSWORD: ecotrack_password
          POSTGRES_DB: ecotrack_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://ecotrack:ecotrack_password@localhost:5432/ecotrack_db
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './backend/${{ matrix.service }}/package-lock.json'

      - name: Install dependencies
        working-directory: ./backend/${{ matrix.service }}
        run: npm ci
        # Allow failure for services not yet fully configured
        continue-on-error: ${{ contains(fromJSON('["service-containers", "service-analytics", "service-routes", "service-api-gateway"]'), matrix.service) }}

      - name: Run tests
        working-directory: ./backend/${{ matrix.service }}
        run: |
          if [ "${{ matrix.service }}" == "service-users" ]; then
            npm test -- --coverage
          else
            npm test
          fi
        continue-on-error: ${{ contains(fromJSON('["service-containers", "service-analytics", "service-routes", "service-api-gateway"]'), matrix.service) }}

      - name: Upload coverage to Codecov
        if: matrix.service == 'service-users'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/service-users/coverage/coverage-final.json
          flags: service-users
